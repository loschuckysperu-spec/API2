<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección de Links</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#050609;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}
.header{
  height:90px;
  background:#18191f;
  border-bottom:1px solid #333641;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 48px;
}
.brand{
  display:flex;
  align-items:center;
  gap:22px;
}
.menu{
  font-size:34px;
  color:#a1a7b5;
}
.brand h1{
  margin:0;
  font-size:32px;
}
.status{
  display:flex;
  align-items:center;
  gap:10px;
  color:#b6bfd0;
  font-size:20px;
}
.dot{
  width:14px;
  height:14px;
  background:#3ee083;
  border-radius:50%;
  box-shadow:0 0 12px #3ee083;
}
.container{
  padding:78px 46px;
}
.toolbar{
  background:#18191f;
  border:1px solid #3a3d47;
  border-radius:22px;
  padding:32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  margin-bottom:32px;
}
.title{
  display:flex;
  align-items:center;
  gap:18px;
}
.title h2{
  margin:0;
  font-size:38px;
}
.badge{
  background:#292b33;
  color:#cbd5e1;
  padding:10px 17px;
  border-radius:50%;
  font-size:20px;
  font-weight:bold;
}
.actions{
  display:flex;
  gap:14px;
}
button{
  border:none;
  border-radius:13px;
  padding:18px 28px;
  font-size:22px;
  cursor:pointer;
  font-weight:600;
}
.btn-dark{background:#272932;color:#b9c1d2}
.btn-green{background:#45df86;color:#041008}
.btn-blue{background:#38bdf8;color:#031018}
.btn-red{background:#ef4444;color:white;padding:12px 18px;font-size:16px}
.btn-edit{background:#f59e0b;color:#111827;padding:12px 18px;font-size:16px}
.table-box{
  background:#18191f;
  border:1px solid #3a3d47;
  border-radius:22px;
  overflow:hidden;
}
table{
  width:100%;
  border-collapse:collapse;
}
thead{
  border-bottom:1px solid #30323a;
}
th{
  padding:20px;
  font-size:26px;
  text-align:left;
}
td{
  padding:18px 20px;
  border-bottom:1px solid #2a2d35;
  color:#cbd5e1;
  font-size:18px;
}
.link-url{
  color:#38bdf8;
  text-decoration:none;
  word-break:break-all;
}
.link-url:hover{text-decoration:underline}
.estado{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(62,224,131,.12);
  color:#3ee083;
  font-weight:bold;
}
.empty{
  height:250px;
  text-align:center;
  color:#8b95b3;
  font-size:24px;
}
.empty-icon{
  font-size:55px;
  margin-bottom:12px;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  align-items:center;
  justify-content:center;
  z-index:99;
}
.modal.active{display:flex}
.form{
  width:430px;
  background:#18191f;
  border:1px solid #3a3d47;
  border-radius:22px;
  padding:30px;
}
.form h3{
  margin-top:0;
  font-size:28px;
}
input{
  width:100%;
  padding:15px;
  margin-bottom:14px;
  border-radius:10px;
  border:1px solid #343741;
  background:#0f1015;
  color:white;
  font-size:17px;
}
.form-actions{
  display:flex;
  gap:10px;
  justify-content:flex-end;
}
@media(max-width:800px){
  .header{padding:0 18px}
  .brand h1{font-size:24px}
  .container{padding:30px 15px}
  .toolbar{flex-direction:column;align-items:flex-start}
  .actions{flex-wrap:wrap}
  .title h2{font-size:28px}
  button{font-size:18px;padding:14px 18px}
  th,td{font-size:16px}
}
</style>
</head>

<body>

<header class="header">
  <div class="brand">
    <div class="menu">☰</div>
    <h1>Colección</h1>
  </div>

  <div class="status">
    <span class="dot"></span>
    <span id="apiStatus">API conectada</span>
  </div>
</header>

<main class="container">

  <section class="toolbar">
    <div class="title">
      <h2>panel de links</h2>
      <span class="badge" id="contador">0</span>
    </div>

    <div class="actions">
      <button class="btn-dark" onclick="ordenarLinks()">↕ Ordenar</button>
      <button class="btn-green" onclick="abrirModal()">＋ Nuevo</button>
      <button class="btn-blue" onclick="buscarLinks()">⌕ Buscar</button>
    </div>
  </section>

  <section class="table-box">
    <table>
      <thead>
        <tr>
          <th>Orden</th>
          <th>Nombre</th>
          <th>Link</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </section>

</main>

<div class="modal" id="modal">
  <div class="form">
    <h3 id="modalTitulo">Nuevo link</h3>

    <input type="hidden" id="id">
    <input id="nombre" placeholder="Nombre del link">
    <input id="url" placeholder="URL del link">
    <input id="orden" type="number" placeholder="Orden">

    <div class="form-actions">
      <button class="btn-dark" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-green" onclick="guardarLink()">Guardar</button>
    </div>
  </div>
</div>

<script>
const API_URL = "/datos";
let links = [];
let linksOriginales = [];

async function cargarLinks(){
  try{
    const res = await fetch(API_URL);
    links = await res.json();

    if(!Array.isArray(links)) links = [];

    linksOriginales = [...links];
    document.getElementById("apiStatus").textContent = "API conectada";
    pintarLinks();
  }catch(error){
    console.error(error);
    document.getElementById("apiStatus").textContent = "API sin conexión";
    links = [];
    pintarLinks();
  }
}

function pintarLinks(){
  const tabla = document.getElementById("tabla");
  document.getElementById("contador").textContent = links.length;

  if(links.length === 0){
    tabla.innerHTML = `
      <tr>
        <td colspan="5" class="empty">
          <div class="empty-icon">▢</div>
          No hay links
        </td>
      </tr>
    `;
    return;
  }

  tabla.innerHTML = links.map(item => `
    <tr>
      <td>${item.orden ?? "-"}</td>
      <td>${item.nombre ?? "Sin nombre"}</td>
      <td>
        <a class="link-url" href="${item.url}" target="_blank">
          ${item.url}
        </a>
      </td>
      <td><span class="estado">Activo</span></td>
      <td>
        <button class="btn-edit" onclick="editarLink('${item._id}')">Editar</button>
        <button class="btn-red" onclick="eliminarLink('${item._id}')">Eliminar</button>
      </td>
    </tr>
  `).join("");
}

function abrirModal(){
  document.getElementById("modal").classList.add("active");
  document.getElementById("modalTitulo").textContent = "Nuevo link";
  document.getElementById("id").value = "";
  document.getElementById("nombre").value = "";
  document.getElementById("url").value = "";
  document.getElementById("orden").value = links.length + 1;
}

function cerrarModal(){
  document.getElementById("modal").classList.remove("active");
}

async function guardarLink(){
  const id = document.getElementById("id").value;
  const nombre = document.getElementById("nombre").value.trim();
  const url = document.getElementById("url").value.trim();
  const orden = Number(document.getElementById("orden").value);

  if(!nombre) return alert("Escribe el nombre");
  if(!url) return alert("Escribe el link");
  if(!orden) return alert("Escribe el orden");

  const data = { nombre, url, orden };

  await fetch(id ? `${API_URL}/${id}` : API_URL, {
    method: id ? "PUT" : "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  cerrarModal();
  cargarLinks();
}

function editarLink(id){
  const item = links.find(x => x._id === id);
  if(!item) return;

  document.getElementById("modal").classList.add("active");
  document.getElementById("modalTitulo").textContent = "Editar link";
  document.getElementById("id").value = item._id;
  document.getElementById("nombre").value = item.nombre || "";
  document.getElementById("url").value = item.url || "";
  document.getElementById("orden").value = item.orden || 1;
}

async function eliminarLink(id){
  if(!confirm("¿Eliminar este link?")) return;

  await fetch(`${API_URL}/${id}`, {
    method: "DELETE"
  });

  cargarLinks();
}

function ordenarLinks(){
  links.sort((a,b) => Number(a.orden || 0) - Number(b.orden || 0));
  pintarLinks();
}

function buscarLinks(){
  const texto = prompt("Buscar link:");
  if(!texto){
    links = [...linksOriginales];
    pintarLinks();
    return;
  }

  const q = texto.toLowerCase();

  links = linksOriginales.filter(item =>
    String(item.nombre || "").toLowerCase().includes(q) ||
    String(item.url || "").toLowerCase().includes(q)
  );

  pintarLinks();
}

cargarLinks();
</script>

</body>
</html>
